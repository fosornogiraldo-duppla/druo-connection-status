<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRUO Connection Status</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #f8fafc;
        }

        .druo-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .hero {
            background: var(--color-brand-dark);
            color: white;
            padding: 32px;
            border-radius: 16px;
            margin-bottom: 32px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .hero h1 {
            font-size: 28px;
            margin: 0 0 8px 0;
        }

        .hero p {
            opacity: 0.8;
            margin: 0;
        }

        /* Badge styling override based on DRUO requirements */
        .badge.druo-failed {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
        }

        .badge.druo-null {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #cbd5e1;
        }
    </style>
</head>

<body>

    <div class="druo-container">
        <!-- HEADER -->
        <header class="hero">
            <h1>DRUO Connection Status</h1>
            <p class="text-sm">Monitoreo de estado de conexión de clientes a DRUO</p>
        </header>

        <!-- KPIs DRUO -->
        <div class="kpi-grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 24px;">
            <div class="kpi-card"
                style="background-color: white; border: 1px solid var(--color-border); box-shadow: var(--shadow-sm);">
                <div class="kpi-value highlight" id="druo-kpi-total">0</div>
                <div class="text-sm" style="color: var(--color-text-secondary); font-weight: 500;">Total No Conectados
                </div>
            </div>
            <div class="kpi-card"
                style="background-color: white; border: 1px solid var(--color-border); box-shadow: var(--shadow-sm);">
                <div class="kpi-value text-danger" id="druo-kpi-failed">0</div>
                <div class="text-sm" style="color: var(--color-text-secondary); font-weight: 500;">Fallaron
                    (CONNECTION_FAILED)</div>
            </div>
            <div class="kpi-card"
                style="background-color: white; border: 1px solid var(--color-border); box-shadow: var(--shadow-sm);">
                <div class="kpi-value" style="color: #475569;" id="druo-kpi-null">0</div>
                <div class="text-sm" style="color: var(--color-text-secondary); font-weight: 500;">Nunca Intentados
                    (null)</div>
            </div>
        </div>

        <!-- FILTROS -->
        <section class="table-container" style="margin-bottom: 32px; padding: 24px;">
            <div class="filters-header">
                <span class="text-sm font-bold" style="font-size: 16px;">Filtros de Búsqueda</span>
            </div>
            <div id="filters-content-druo" style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 16px;">
                <div class="filter-group" style="flex: 1; min-width: 200px;">
                    <span class="text-sm font-bold" style="display: block; margin-bottom: 8px;">Status:</span>
                    <select id="druo-filter-status"
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--color-border); background: #f8fafc; font-family: inherit;">
                        <option value="all">Todos</option>
                        <option value="null">Nunca Intentados (null)</option>
                        <option value="CONNECTION_FAILED">Fallaron (CONNECTION_FAILED)</option>
                    </select>
                </div>
                <div class="filter-group" style="flex: 1; min-width: 200px;">
                    <span class="text-sm font-bold" style="display: block; margin-bottom: 8px;">Portafolio:</span>
                    <select id="druo-filter-portafolio"
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--color-border); background: #f8fafc; font-family: inherit;">
                        <option value="all">Todos</option>
                    </select>
                </div>
                <div class="filter-group" style="flex: 1; min-width: 250px;">
                    <span class="text-sm font-bold" style="display: block; margin-bottom: 8px;">Buscar:</span>
                    <input id="druo-search-input" type="text" class="client-search-input"
                        placeholder="Nombre de oportunidad o código..."
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--color-border); background: #f8fafc;">
                </div>
            </div>
        </section>

        <!-- TABLA -->
        <section class="table-container">
            <table id="druo-table" style="width: 100%; text-align: left; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th
                            style="padding: 16px 20px; border-bottom: 1px solid var(--color-border); color: var(--color-text-secondary); font-size: 12px; text-transform: uppercase;">
                            Inmueble</th>
                        <th
                            style="padding: 16px 20px; border-bottom: 1px solid var(--color-border); color: var(--color-text-secondary); font-size: 12px; text-transform: uppercase;">
                            Oportunidad</th>
                        <th
                            style="padding: 16px 20px; border-bottom: 1px solid var(--color-border); color: var(--color-text-secondary); font-size: 12px; text-transform: uppercase;">
                            Portafolio</th>
                        <th
                            style="padding: 16px 20px; border-bottom: 1px solid var(--color-border); color: var(--color-text-secondary); font-size: 12px; text-transform: uppercase;">
                            Fecha Entrega</th>
                        <th
                            style="padding: 16px 20px; border-bottom: 1px solid var(--color-border); color: var(--color-text-secondary); font-size: 12px; text-transform: uppercase;">
                            Status DRUO</th>
                    </tr>
                </thead>
                <tbody id="druo-tbody">
                    <!-- Rows rendered by JS -->
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px;">Cargando datos...</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </div>

    <!-- Info Modal -->
    <div id="infoModal" class="modal"
        style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; backdrop-filter: blur(4px);">
        <div class="modal-content"
            style="background-color: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; margin: 10vh auto;">
            <span class="close" id="modal-close"
                style="color: #94a3b8; position: absolute; right: 24px; top: 24px; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 1;">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseConfig.js"></script>
    <script src="druo.js"></script>

</body>

</html>
